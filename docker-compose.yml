services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: polarities
    ports:
      - "5432:5432"
    volumes:
      - polarities-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d polarities"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/polarities?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: local-development-secret-change-me
      ALLOW_UNAUTHENTICATED_ADMIN: "true"
      SKIP_SEED_IF_ARTICLES_EXIST: "true"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node server.js"

volumes:
  polarities-db:
